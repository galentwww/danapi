services:
  middleware:
    image: ${MIDDLEWARE_IMAGE:-ghcr.io/galentwww/danapi:latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DANDANPLAY_BASE_URL: ${DANDANPLAY_BASE_URL:-https://api.dandanplay.net}
      APP_ID: ${APP_ID:-}
      APP_SECRET: ${APP_SECRET:-}
      DANDANPLAY_KEYS: ${DANDANPLAY_KEYS:-}
      DANDANPLAY_CREDENTIAL_LOG: ${DANDANPLAY_CREDENTIAL_LOG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgres://middleware:middleware_password@postgres:5432/dandanplay_middleware?sslmode=disable}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SEARCH_CACHE_DURATION: ${SEARCH_CACHE_DURATION:-3600}
      DANMAKU_CACHE_DURATION: ${DANMAKU_CACHE_DURATION:-1800}
      REDIS_SNAPSHOT_TTL: ${REDIS_SNAPSHOT_TTL:-172800}
      DEFAULT_REFRESH_INTERVAL: ${DEFAULT_REFRESH_INTERVAL:-86400}
      EMPTY_DANMAKU_REFRESH_INTERVAL: ${EMPTY_DANMAKU_REFRESH_INTERVAL:-3600}
      REFRESH_FAILURE_RETRY_INTERVAL: ${REFRESH_FAILURE_RETRY_INTERVAL:-1800}
      REFRESH_ACCESS_WINDOW: ${REFRESH_ACCESS_WINDOW:-86400}
      HOT_ACCESS_THRESHOLD: ${HOT_ACCESS_THRESHOLD:-10}
      HOT_CHANGED_REFRESH_INTERVAL: ${HOT_CHANGED_REFRESH_INTERVAL:-7200}
      HOT_UNCHANGED_REFRESH_INTERVAL: ${HOT_UNCHANGED_REFRESH_INTERVAL:-21600}
      NORMAL_CHANGED_REFRESH_INTERVAL: ${NORMAL_CHANGED_REFRESH_INTERVAL:-43200}
      STABLE_REFRESH_INTERVAL: ${STABLE_REFRESH_INTERVAL:-259200}
      ARCHIVED_REFRESH_INTERVAL: ${ARCHIVED_REFRESH_INTERVAL:-604800}
      REFRESH_QUEUE_SIZE: ${REFRESH_QUEUE_SIZE:-100}
      REFRESH_WORKER_COUNT: ${REFRESH_WORKER_COUNT:-2}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Origin,Content-Type,Accept,Authorization,X-Requested-With}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dandanplay_middleware}
      POSTGRES_USER: ${POSTGRES_USER:-middleware}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-middleware_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:

services:
  middleware:
    image: ghcr.io/galentwww/danapi:latest
    container_name: dandanplay-middleware
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DANDANPLAY_BASE_URL: https://api.dandanplay.net

      # Single credential fallback. Leave these empty when DANDANPLAY_KEYS is set.
      APP_ID: ""
      APP_SECRET: ""

      # Preferred for multiple credentials: app_id_1:app_secret_1,app_id_2:app_secret_2
      DANDANPLAY_KEYS: ""
      DANDANPLAY_CREDENTIAL_LOG: "false"
      DANMAKU_DECISION_LOG: "false"

      DATABASE_URL: postgres://middleware:middleware_password@postgres:5432/dandanplay_middleware?sslmode=disable
      DATABASE_READONLY_USER: middleware_readonly
      DATABASE_READONLY_PASSWORD: readonly_password_change_me
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"

      SERVER_PORT: "8080"
      GIN_MODE: release

      SEARCH_CACHE_DURATION: "3600"
      DANMAKU_CACHE_DURATION: "1800"
      REDIS_SNAPSHOT_TTL: "172800"
      DEFAULT_REFRESH_INTERVAL: "86400"
      EMPTY_DANMAKU_REFRESH_INTERVAL: "3600"
      REFRESH_FAILURE_RETRY_INTERVAL: "1800"
      REFRESH_ACCESS_WINDOW: "86400"
      HOT_ACCESS_THRESHOLD: "10"
      HOT_CHANGED_REFRESH_INTERVAL: "7200"
      HOT_UNCHANGED_REFRESH_INTERVAL: "21600"
      NORMAL_CHANGED_REFRESH_INTERVAL: "43200"
      STABLE_REFRESH_INTERVAL: "259200"
      ARCHIVED_REFRESH_INTERVAL: "604800"
      REFRESH_QUEUE_SIZE: "100"
      REFRESH_WORKER_COUNT: "2"

      CORS_ALLOW_ORIGINS: "*"
      CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
      CORS_ALLOW_HEADERS: Origin,Content-Type,Accept,Authorization,X-Requested-With
      CORS_EXPOSE_HEADERS: X-Danmaku-Cache,X-Danmaku-Variant,X-Danmaku-Fetched-At,X-Danmaku-Next-Refresh-At
      CORS_ALLOW_CREDENTIALS: "false"
      CORS_MAX_AGE: "86400"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${SERVER_PORT:-8080}/readyz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: dandanplay-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: dandanplay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dandanplay_middleware
      POSTGRES_USER: middleware
      POSTGRES_PASSWORD: middleware_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    name: dandanplay_middleware_redis_data
  postgres-data:
    name: dandanplay_middleware_postgres_data
